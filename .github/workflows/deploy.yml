name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_GOOGLE_ANALYTICS: G-RH74DXLKZL

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set base path (main → /fullstack-profile)
        if: github.ref_name == 'main'
        run: echo "NEXT_PUBLIC_BASE_PATH=/fullstack-profile" >> $GITHUB_ENV

      - name: Set base path (dev → /fullstack-profile/dev)
        if: github.ref_name != 'main'
        run: echo "NEXT_PUBLIC_BASE_PATH=/fullstack-profile/dev" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install packages
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Add .nojekyll file
        run: touch ./out/.nojekyll

      - name: Deploy (main → root, preserves /dev subfolder)
        if: github.ref_name == 'main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          clean-exclude: dev

      - name: Deploy (dev → /dev subfolder)
        if: github.ref_name != 'main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          target-folder: dev
